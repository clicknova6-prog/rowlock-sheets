# Firebase App Hosting runs this Next.js custom server through `npm run start`.
# Keep maxInstances conservative while Cloud SQL usage is being validated.
runConfig:
  cpu: 1
  memoryMiB: 1024
  concurrency: 200
  minInstances: 0
  maxInstances: 1

env:
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME
  - variable: SKIP_AUTH
    value: "false"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ENABLE_SOCKET_SYNC
    value: "false"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ENABLE_FIRESTORE_SYNC
    value: "true"
    availability:
      - BUILD
      - RUNTIME
  - variable: DB_CONNECTION_LIMIT
    value: "5"
    availability:
      - RUNTIME
  - variable: DB_CONNECT_TIMEOUT_MS
    value: "15000"
    availability:
      - RUNTIME
  - variable: DB_ACQUIRE_TIMEOUT_MS
    value: "15000"
    availability:
      - RUNTIME
  - variable: DB_IDLE_TIMEOUT_SECONDS
    value: "60"
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://rowlock-sheets--jobsheet-291c1.us-central1.hosted.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_PROJECT_ID
    value: "jobsheet-291c1"
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_ADMIN_EMAILS
    value: "clicknova6@gmail.com"
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCB7HaYIwkx643uavT-QqLGv3QVGSSNgw4"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "jobsheet-291c1.firebaseapp.com"
